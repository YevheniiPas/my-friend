<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт для друга</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('hmara.jpg'); 
            background-size: 100% 100%;   
            background-position: center;   
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #111111; 
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            position: relative; 
            height: 100vh;
            overflow: hidden;
        }

        /* Налаштування картки ДЛЯ КОМП'ЮТЕРІВ (вгорі праворуч) */
        .main-card {
            position: absolute;
            top: 40px;     
            right: 40px;   
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            padding: 35px 25px;
            text-align: center;
            max-width: 320px; 
            width: 85%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }

        .question-text {
            color: #ffffff; 
            font-size: 26px; 
            font-weight: 800;
            margin: 0 0 25px 0;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            width: 100%;
        }

        .btn {
            display: block;
            color: white;
            padding: 14px 25px;
            text-decoration: none; 
            border-radius: 16px; 
            font-size: 16px;
            font-weight: bold;
            transition: all 0.25s ease; 
            box-sizing: border-box;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px); 
        }

        /* 1. Червона кнопка Інстаграм */
        .btn-red {
            background: linear-gradient(135deg, #ff1f35, #ff4757);
            box-shadow: 0 4px 15px rgba(255, 31, 53, 0.4);
        }
        .btn-red:hover {
            background: linear-gradient(135deg, #ff4757, #ff1f35);
            box-shadow: 0 6px 20px rgba(255, 31, 53, 0.6);
        }

        /* 2. Синя кнопка Поліції */
        .btn-blue {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
        }
        .btn-blue:hover {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.6);
        }

        /* 3. Зелена кнопка Монобанку */
        .btn-green {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }
        .btn-green:hover {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
        }

        /* 4. Веселкова кнопка Я Ярик */
        .btn-lgbt {
            background: linear-gradient(90deg, #e74c3c, #e67e22, #f1c40f, #2ecc71, #3498db, #9b59b6);
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        .btn-lgbt:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.6);
        }

        /* 📱 АВТОМАТИЧНЕ НАЛАШТУВАННЯ ДЛЯ ТЕЛЕФОНІВ (Екрани менше 768 пікселів) */
        @media (max-width: 768px) {
            .main-card {
                top: auto;      /* Відключаємо верхній відступ */
                right: auto;    /* Відключаємо правий відступ */
                bottom: 30px;   /* Притискаємо картку до самого низу екрана телефону */
                left: 50%;      /* Центруємо картку по ширині екрана */
                transform: translateX(-50%); /* Точне центрування */
                padding: 25px 20px;
                max-width: 340px;
                width: 90%;
            }
            .question-text {
                font-size: 22px; /* Трохи зменшуємо текст, щоб вміщався на телефонах */
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="question-text">Нащо ти тут?</h1>
        <div class="buttons-group">
            <a href="https://instagram.com" target="_blank" class="btn btn-red">Познайомитись</a>
            <a href="https://npu.gov.ua" target="_blank" class="btn btn-blue">Маєш претензії?</a>
            <a href="https://monobank.ua" target="_blank" class="btn btn-green">Допомога бідним</a>
            <a href="./storinka2.html" class="btn btn-lgbt">Я Ярик</a>
        </div>
    </div>

</body>
</html>
