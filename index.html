<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт для друга</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url('hmara.jpg'); 
            background-size: 100% 100%;   
            background-position: center;   
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #111111; 
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            position: relative; 
            height: 100vh;
            overflow: hidden;
        }

        /* ✨ ТА САМА КАРТКА З ОШЕЛОМЛЯЮЧИМ ЕФЕКТОМ РОЗМИТТЯ ТЛА */
        .main-card {
            position: absolute;
            top: 40px;     
            right: 40px;   
            background: rgba(15, 15, 20, 0.45); /* Напівпрозорий темний колір */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 24px; 
            padding: 35px 25px; 
            text-align: center;
            max-width: 300px;  
            width: 85%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); 
            
            /* 🔮 Головна магія розмиття скла (Backdrop Filter) */
            backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px);
            z-index: 10;
        }

        .question-text {
            color: #ffffff; 
            font-size: 24px; 
            font-weight: 800;
            margin: 0 0 25px 0;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            width: 100%;
        }

        /* ✨ СКЛЯНІ НЕОНОВІ КНОПКИ З ЕФЕКТОМ РОЗПЛИВАННЯ ТА БЛІКАМИ */
        .btn {
            display: block;
            color: white;
            padding: 13px 20px; 
            text-decoration: none; 
            border-radius: 14px; 
            font-size: 14px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-sizing: border-box;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
        }

        /* Білий глянцевий спалах-блік всередині кнопки */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
        }
        .btn:hover::after {
            left: 150%;
            transition: all 0.6s ease-in-out;
        }

        /* 🔴 1. Червоний неоновий розмив (Познайомитись) */
        .btn-red {
            border: 1px solid #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }
        .btn-red:hover {
            background: #ff4757;
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.7);
        }

        /* 🔵 2. Синій неоновий розмив (Маєш претензії?) */
        .btn-blue {
            border: 1px solid #0055ff;
            box-shadow: 0 0 10px rgba(0, 85, 255, 0.2);
        }
        .btn-blue:hover {
            background: #0055ff;
            box-shadow: 0 0 25px rgba(0, 85, 255, 0.7);
        }

        /* 🟢 3. Зелений неоновий розмив (Допомога бідним) */
        .btn-green {
            border: 1px solid #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.2);
        }
        .btn-green:hover {
            background: #2ecc71;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.7);
        }

        /* 🌈 4. Веселковий неоновий розмив (Я Ярик) */
        .btn-lgbt {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.15), rgba(230, 126, 34, 0.15), rgba(241, 196, 114, 0.15), rgba(46, 204, 113, 0.15));
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.2);
        }
        .btn-lgbt:hover {
            background: linear-gradient(90deg, #e74c3c, #e67e22, #f1c40f, #2ecc71, #3498db, #9b59b6);
            box-shadow: 0 0 25px rgba(230, 126, 34, 0.7);
        }

        /* 👾 5. Фіолетовий неоновий розмив (Зіграти в гру) */
        .btn-game {
            border: 1px solid #b300ff;
            box-shadow: 0 0 10px rgba(179, 0, 255, 0.2);
        }
        .btn-game:hover {
            background: #b300ff;
            box-shadow: 0 0 25px rgba(179, 0, 255, 0.7);
        }

        /* Адаптація під мобільні телефони (картка зсувається вниз і центрується) */
        @media (max-width: 768px) {
            .main-card {
                top: auto;      
                right: auto;    
                bottom: 30px;   
                left: 50%;      
                transform: translateX(-50%); 
                padding: 25px 20px;
                max-width: 300px;
                width: 90%;
            }
            .question-text { font-size: 20px; margin-bottom: 15px; }
            .btn { padding: 11px 15px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="question-text">Нащо ти тут?</h1>
        <div class="buttons-group">
            <!-- 1. Твоє точне посилання на Інстаграм -->
            <a href="https://instagram.com" target="_blank" class="btn btn-red">Познайомитись</a>
            
            <!-- 2. Поліція -->
            <a href="https://npu.gov.ua" target="_blank" class="btn btn-blue">Маєш претензії?</a>
            
            <!-- 3. Банка банки -->
            <a href="./storinka3.html" class="btn btn-green">Допомога бідним</a>
            
            <!-- 4. Сторінка 2 Ярик -->
            <a href="./storinka2.html" class="btn btn-lgbt">Я Ярик</a>
            
            <!-- 5. Гра -->
            <a href="./gra.html" class="btn btn-game">Зіграти в гру 🕹️</a>
        </div>
    </div>

</body>
</html>
