<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ігровий Хаб 🕹️</title>
    <style>
        body {
            background-color: #111111;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('hmara.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Матова картка меню */
        .menu-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 360px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        p {
            color: #ccc;
            font-size: 15px;
            margin: 0 0 30px 0;
        }

        .game-buttons-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* Стильні кнопки для вибору ігор */
        .game-btn {
            display: block;
            color: white;
            padding: 16px 20px;
            text-decoration: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.25s ease;
            box-sizing: border-box;
            width: 100%;
            text-align: center;
        }

        .game-btn:hover {
            transform: translateY(-3px);
        }

        /* Гра 1: Flappy Bird */
        .btn-flappy {
            background: linear-gradient(135deg, #ff9900, #ff6600);
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.35);
        }
        .btn-flappy:hover {
            box-shadow: 0 6px 20px rgba(255, 153, 0, 0.55);
        }

        /* Гра 2: Клікер */
        .btn-clicker {
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.35);
        }
        .btn-clicker:hover {
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.55);
        }

        .btn-back {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 30px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        .btn-back:hover { 
            background: rgba(255, 255, 255, 0.2); 
        }
    </style>
</head>
<body>

    <div class="menu-card">
        <h1>ОКРЕМА ЗОНА 🕹️</h1>
        <p> Обери гру та покажи, на що здатний!</p>

        <div class="game-buttons-group">
            <!-- Кнопка для першої гри (перейменуємо файл на game1.html) -->
            <a href="./game1.html" class="game-btn btn-flappy">Летючий Женька 🚀</a>
            
            <!-- Кнопка для другої гри (створимо файл game2.html) -->
            <a href="./game2.html" class="game-btn btn-clicker">Женька-Клікер 👑</a>
        </div>

        <a href="./index.html" class="btn-back">← На головну</a>
    </div>

</body>
</html>
