<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Летючий Женька 🕹️</title>
    <style>
        body {
            background-color: #111111;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 { margin-bottom: 5px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .score-box { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #f1c40f; }

        #gameArea {
            width: 600px;
            height: 400px; 
            position: relative;
            background-color: #000000; 
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('game-bg..png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 4px solid #ff9900; 
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            overflow: hidden;
            cursor: pointer;
        }

        #player {
            width: 55px;  
            height: 70px; 
            position: absolute;
            top: 150px;
            left: 80px;
            background-image: url('jenia-face.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
            transition: transform 0.1s ease;
        }

        .pipe {
            position: absolute;
            width: 45px; 
            background-image: url('prepyna.png');
            background-size: contain;
            background-repeat: repeat-y;
            z-index: 5;
        }
        
        .pipe-top {
            transform: rotate(180deg);
        }

        .modal-text {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 25px 40px;
            border-radius: 16px;
            text-align: center;
            z-index: 20;
            width: 70%;
        }

        #gameOverText { border: 2px solid #ff4757; }
        #gameOverText h2 { color: #ff4757; margin: 0 0 10px 0; }
        
        #winOverText { border: 2px solid #2ecc71; }
        #winOverText h2 { color: #2ecc71; margin: 0 0 10px 0; font-size: 28px; }

        .modal-text p { margin: 0; font-size: 14px; color: #aaa; }

        .btn-back {
            display: inline-block;
            background: #222;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.2s;
            border: 1px solid #444;
        }
        .btn-back:hover { background: #333; border-color: #ff9900; }
    </style>
</head>
<body>

    <h1>Втримай Женьку в повітрі! 🚀</h1>
    <p style="color: #888; margin: 0 0 10px 0; font-size: 14px;">Натискай <b>Пробіл</b> або клікай по полю, щоб підлетіти вгору</p>
    <div class="score-box">Рахунок: <span id="score">0</span> / 15</div>

    <div id="gameArea" onclick="flap()">
        <div id="player"></div>

        <!-- Екран Програшу -->
        <div id="gameOverText" class="modal-text">
            <h2>ПРИЇХАЛИ! 🛑</h2>
            <p>Натисни Пробіл або клікни, щоб літати знову</p>
        </div>

        <!-- Екран Перемоги -->
        <div id="winOverText" class="modal-text">
            <h2>НІХУЯ ТИ МАШИНА! 🏆</h2>
            <p>Ти пройшов цю гру! Твій друг буде пишатися.</p>
            <a href="./gra.html" class="btn-back" style="margin-top: 15px;">Назад до вибору ігор</a>
        </div>
    </div>

    <a href="./gra.html" class="btn-back">← Назад до меню</a>

    <script>
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const gameOverText = document.getElementById('gameOverText');
        const winOverText = document.getElementById('winOverText');

        let playerTop = 150;
        let velocity = 0;
        const gravity = 0.38;  
        const jumpForce = -6.2; 

        let score = 0;
        let isGameOver = false;
        let gameInterval;
        let pipes = [];
        let pipeSpeed = 3.2; 
        let spawnTimer = 0;

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isGameOver) { resetGame(); } else { flap(); }
            }
        });

        function flap() {
            if (isGameOver) return;
            velocity = jumpForce;
            player.style.transform = "rotate(-12deg)";
        }

        function createPipe() {
            const gap = 155; 
            const minHeight = 40;
            const maxHeight = 400 - gap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            const bottomHeight = 400 - gap - topHeight;

            const pipeTop = document.createElement('div');
            pipeTop.className = 'pipe pipe-top';
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.top = '0px';
            pipeTop.style.left = '600px';
            gameArea.appendChild(pipeTop);

            const pipeBottom = document.createElement('div');
            pipeBottom.className = 'pipe';
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.bottom = '0px';
            pipeBottom.style.left = '600px';
            gameArea.appendChild(pipeBottom);

            pipes.push({
                topElement: pipeTop,
                bottomElement: pipeBottom,
                x: 600,
                passed: false,
                topHeight: topHeight,
                bottomHeight: bottomHeight
            });
        }

        function updateGame() {
            if (isGameOver) return;

            velocity += gravity;
            playerTop += velocity;
            player.style.top = playerTop + 'px';

            if (velocity > 1.5) player.style.transform = "rotate(12deg)";

            if (playerTop > 335 || playerTop < 0) {
                endGame(false);
                return;
            }

            spawnTimer++;
            if (spawnTimer >= 130) { 
                createPipe();
                spawnTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= pipeSpeed;
                p.topElement.style.left = p.x + 'px';
                p.bottomElement.style.left = p.x + 'px';

                if (!p.passed && p.x < 80) {
                    p.passed = true;
                    score++;
                    scoreDisplay.innerText = score;
                    
                    if (score >= 15) {
                        endGame(true);
                        return;
                    }
                    if (pipeSpeed < 5.5) pipeSpeed += 0.12; 
                }

                if (p.x < -60) {
                    p.topElement.remove();
                    p.bottomElement.remove();
                    pipes.splice(i, 1);
                    continue;
                }

                if (p.x > 50 && p.x < 115) { 
                    if (playerTop + 10 < p.topHeight) {
                        endGame(false);
                        return;
                    }
                    if (playerTop + 60 > 400 - p.bottomHeight) {
                        endGame(false);
                        return;
                    }
                }
            }
        }

        function endGame(isWin) {
            isGameOver = true;
            clearInterval(gameInterval);
            if (isWin) {
                winOverText.style.display = 'block';
            } else {
                gameOverText.style.display = 'block';
            }
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            playerTop = 150;
            velocity = 0;
            pipeSpeed = 3.2;
            spawnTimer = 0;
            scoreDisplay.innerText = score;
            gameOverText.style.display = 'none';
            winOverText.style.display = 'none';
            player.style.top = '150px';
            player.style.transform = "rotate(0deg)";

            pipes.forEach(p => {
                p.topElement.remove();
                p.bottomElement.remove();
            });
            pipes = [];

            gameInterval = setInterval(updateGame, 20);
        }

        gameInterval = setInterval(updateGame, 20);
    </script>
</body>
</html>
