<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Летючий Женька 🕹️</title>
    <style>
        body {
            background-color: #111111; color: white; font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
        }
        h1 { margin: 0 0 5px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .score-box { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #f1c40f; }
        #gameArea {
            width: 100%; max-width: 340px; height: 380px; position: relative; background-color: #000000; 
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('game-bg..png'), url('game-bg.png'); 
            background-size: cover; background-repeat: no-repeat; background-position: center;
            border: 3px solid #ff9900; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); overflow: hidden;
        }
        #player {
            width: 45px; height: 58px; position: absolute; top: 150px; left: 40px;
            background-image: url('jenia-face.png'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 10; transition: transform 0.1s ease;
        }
        .pipe { position: absolute; width: 40px; background-image: url('prepyna.png'); background-size: contain; background-repeat: repeat-y; z-index: 5; }
        .pipe-top { transform: rotate(180deg); }
        .jump-btn {
            width: 100%; max-width: 340px; background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold;
            border-radius: 14px; margin-top: 15px; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
        }
        .jump-btn:active { transform: scale(0.97); }
        .modal-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 20px; border-radius: 16px; text-align: center; z-index: 20; width: 85%; }
        #gameOverText { border: 2px solid #ff4757; }
        #gameOverText h2 { color: #ff4757; margin: 0 0 10px 0; font-size: 22px; }
        #winOverText { border: 2px solid #2ecc71; }
        #winOverText h2 { color: #2ecc71; margin: 0 0 10px 0; font-size: 22px; }
        .modal-text p { margin: 0; font-size: 13px; color: #aaa; }
        .btn-back { display: inline-block; background: #222; color: white; padding: 10px 25px; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 15px; transition: 0.2s; border: 1px solid #444; font-size: 13px; }
        .btn-back:hover { background: #333; }
    </style>
</head>
<body>

    <h1>Втримай Женьку! 🚀</h1>
    <div class="score-box">Рахунок: <span id="score">0</span> / 15</div>

    <div id="gameArea" onclick="flap()">
        <div id="player"></div>
        <div id="gameOverText" class="modal-text">
            <h2>ПРИЇХАЛИ! 🛑</h2>
            <p>Тапни по великій кнопці знизу, щоб літати знову</p>
        </div>
        <div id="winOverText" class="modal-text">
            <h2>НІХУЯ ТИ МАШИНА! 🏆</h2>
            <p>Ти пройшов цю гру! Твій друг буде пишатися.</p>
            <a href="./gra.html" class="btn-back" style="margin-top: 15px;">Назад до вибору ігор</a>
        </div>
    </div>

    <button class="jump-btn" onclick="event.stopPropagation(); flap()">СТРИБОК! 🚀</button>
    <a href="./gra.html" class="btn-back">← Назад до меню</a>

    <script>
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const gameOverText = document.getElementById('gameOverText');
        const winOverText = document.getElementById('winOverText');

        let playerTop = 150;
        let velocity = 0;
        const gravity = 0.36;  
        const jumpForce = -5.8; 

        let score = 0;
        let isGameOver = false;
        let gameInterval;
        let pipes = [];
        let pipeSpeed = 2.8; 
        let spawnTimer = 0;

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        function flap() {
            if (isGameOver) { resetGame(); return; }
            velocity = jumpForce;
            player.style.transform = "rotate(-12deg)";
        }

        function createPipe() {
            let areaWidth = gameArea.clientWidth;
            const gap = 145; 
            const minHeight = 40;
            const maxHeight = 380 - gap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            const bottomHeight = 380 - gap - topHeight;

            const pipeTop = document.createElement('div');
            pipeTop.className = 'pipe pipe-top';
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.top = '0px';
            pipeTop.style.left = areaWidth + 'px';
            gameArea.appendChild(pipeTop);

            const pipeBottom = document.createElement('div');
            pipeBottom.className = 'pipe';
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.bottom = '0px';
            pipeBottom.style.left = areaWidth + 'px';
            gameArea.appendChild(pipeBottom);

            pipes.push({
                topElement: pipeTop,
                bottomElement: pipeBottom,
                x: areaWidth,
                passed: false,
                topHeight: topHeight,
                bottomHeight: bottomHeight
            });
        }

        function updateGame() {
            if (isGameOver) return;

            velocity += gravity;
            playerTop += velocity;
            player.style.top = playerTop + 'px';

            if (velocity > 1.5) player.style.transform = "rotate(12deg)";

            if (playerTop > 322 || playerTop < 0) {
                endGame(false);
                return;
            }

            spawnTimer++;
            if (spawnTimer >= 140) { 
                createPipe();
                spawnTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= pipeSpeed;
                p.topElement.style.left = p.x + 'px';
                p.bottomElement.style.left = p.x + 'px';

                if (!p.passed && p.x < 40) {
                    p.passed = true;
                    score++;
                    scoreDisplay.innerText = score;
                    
                    if (score >= 15) {
                        endGame(true);
                        return;
                    }
                    if (pipeSpeed < 5) pipeSpeed += 0.1; 
                }

                if (p.x < -45) {
                    p.topElement.remove();
                    p.bottomElement.remove();
                    pipes.splice(i, 1);
                    continue;
                }

                // 🎯 ФІКС ФАНТОМНИХ ЗАЧЕПІВ під мобільне поле 340px
                // Рахуємо дотик суворо коли перешкода знаходиться в межах від 40px до 85px (де летить Женька)
                if (p.x > 40 && p.x < 85) { 
                    // Перевірка верхньої труби (додали буфер безпеки +12 пікселів)
                    if (playerTop + 12 < p.topHeight) {
                        endGame(false);
                        return;
                    }
                    // Перевірка нижньої труби (додали буфер безпеки зрізу ніг -12 пікселів)
                    if (playerTop + 46 > 380 - p.bottomHeight) {
                        endGame(false);
                        return;
                    }
                }
            }
        }

        function endGame(isWin) {
            isGameOver = true;
            clearInterval(gameInterval);
            if (isWin) {
                winOverText.style.display = 'block';
            } else {
                gameOverText.style.display = 'block';
            }
        }

        function resetGame() {
            isGameOver = false;
            score = 0;
            playerTop = 150;
            velocity = 0;
            pipeSpeed = 2.8;
            spawnTimer = 0;
            scoreDisplay.innerText = score;
            gameOverText.style.display = 'none';
            winOverText.style.display = 'none';
            player.style.top = '150px';
            player.style.transform = "rotate(0deg)";

            pipes.forEach(p => {
                p.topElement.remove();
                p.bottomElement.remove();
            });
            pipes = [];

            gameInterval = setInterval(updateGame, 20);
        }

        gameInterval = setInterval(updateGame, 20);
    </script>
</body>
</html>
