<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Пизди малого! 🎯</title>
    <style>
        body {
            background-color: #111111; color: white; font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('hmara2.jpg'); background-size: cover; background-position: center; background-attachment: fixed;
        }
        h1 { margin: 0 0 25px 0; font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .status-panel { display: flex; gap: 30px; margin-bottom: 20px; background: rgba(0, 0, 0, 0.6); padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); font-size: 20px; font-weight: bold; backdrop-filter: blur(5px); }
        .score-text { color: #2ecc71; }
        .lives-text { color: #e74c3c; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 15px; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .hole { background: #111111; border-radius: 50%; position: relative; overflow: hidden; border: 3px solid #333; box-shadow: inset 0 8px 15px rgba(0,0,0,0.8); box-sizing: border-box; cursor: pointer; }
        .mole { width: 100%; height: 100%; background-image: url('jenia-face2.png'); background-size: cover; background-position: center; border-radius: 50%; position: absolute; top: 100%; transition: top 0.1s ease-out; }
        .mole.active { top: 0; }
        .modal-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 25px 40px; border-radius: 16px; text-align: center; z-index: 100; width: 280px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        #gameOverText { border: 2px solid #e74c3c; }
        #gameOverText h2 { color: #e74c3c; margin: 0 0 10px 0; }
        #winOverText { border: 2px solid #2ecc71; }
        #winOverText h2 { color: #2ecc71; margin: 0 0 10px 0; font-size: 24px; }
        .modal-text p { margin: 0; font-size: 14px; color: #aaa; }
        .btn-back { display: inline-block; background: #222; color: white; padding: 12px 30px; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 25px; transition: 0.2s; border: 1px solid #444; font-size: 14px; }
        .btn-back:hover { background: #333; border-color: #2ecc71; }
    </style>
</head>
<body>

    <h1>Пизди малого! 🎯</h1>

    <div class="status-panel">
        <div class="score-text">Очки: <span id="score">0</span> / 20</div>
        <div class="lives-text">Життя: <span id="lives">❤️❤️❤️</span></div>
    </div>

    <div class="game-grid">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <div id="gameOverText" class="modal-text">
        <h2>ТИ СЛІВ СЯ! 🛑</h2>
        <p>Він виявився швидшим за твої пальці.</p>
        <button class="btn-back" onclick="resetGame()" style="cursor:pointer; margin-top:15px;">Спробувати знову</button>
    </div>

    <div id="winOverText" class="modal-text">
        <h2>НІХУЯ ТИ МАШИНА! 🏆</h2>
        <p>Твоя реакція просто космос!</p>
        <a href="./gra.html" class="btn-back" style="margin-top: 15px;">До вибору ігор</a>
    </div>

    <a href="./gra.html" class="btn-back">← Назад до меню</a>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const gameOverText = document.getElementById('gameOverText');
        const winOverText = document.getElementById('winOverText');

        let lastHole; let isGameOver = false; let score = 0; let lives = 3;
        let peepTime = 900; let gameTimer; let activeMole = null;

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) { return randomHole(holes); }
            lastHole = hole; return hole;
        }

        function peep() {
            if (isGameOver) return;
            const hole = randomHole(holes); const mole = hole.querySelector('.mole');
            mole.classList.add('active'); activeMole = mole;
            gameTimer = setTimeout(() => {
                mole.classList.remove('active'); activeMole = null;
                if (!isGameOver) peep();
            }, peepTime);
        }

        holes.forEach(hole => {
            hole.addEventListener('click', (e) => {
                if (isGameOver) return;
                const mole = hole.querySelector('.mole');
                if (mole.classList.contains('active')) {
                    score++; scoreDisplay.innerText = score;
                    mole.classList.remove('active'); activeMole = null;
                    clearTimeout(gameTimer); 
                    if (score >= 20) { endGame(true); return; }
                    if (score >= 18) { peepTime = 380; } else { peepTime = 900 - (score * 28); }
                    setTimeout(peep, 80); 
                } else {
                    lives--; updateLivesDisplay();
                    if (lives <= 0) { endGame(false); }
                }
            });
        });

        function updateLivesDisplay() {
            if (lives === 3) livesDisplay.innerText = "❤️❤️❤️";
            if (lives === 2) livesDisplay.innerText = "❤️❤️";
            if (lives === 1) livesDisplay.innerText = "❤️";
            if (lives === 0) livesDisplay.innerText = "💔 Слив";
        }

        function endGame(isWin) {
            isGameOver = true; clearTimeout(gameTimer);
            if (activeMole) activeMole.classList.remove('active');
            if (isWin) { winOverText.style.display = 'block'; } else { gameOverText.style.display = 'block'; }
        }

        function resetGame() {
            isGameOver = false; score = 0; lives = 3; peepTime = 900;
            scoreDisplay.innerText = score; updateLivesDisplay();
            gameOverText.style.display = 'none'; winOverText.style.display = 'none';
            peep();
        }

        peep();
    </script>
</body>
</html>
