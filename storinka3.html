<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Допомога бідним</title>
    <style>
        body {
            background-color: #111111;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Стиль для великого фото банки з кодом і номером */
        .banka-photo {
            max-width: 100%;
            max-height: 75vh; /* Фото займає максимум 75% висоти екрана, щоб вміщалася кнопка */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-bottom: 30px;
            display: block;
            object-fit: contain;
        }

        /* Кнопка Повернутися назад */
        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.35);
            transition: all 0.25s ease;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.55);
        }
    </style>
</head>
<body>

    <!-- Ваше велике фото banka.jpg -->
    <img src="banka.jpg" class="banka-photo" alt="Монобанк">

    <!-- Кнопка повернення на головну -->
    <a href="./index.html" class="btn-back">← На головну</a>

</body>
</html>
